<!DOCTYPE html>
<html>
<head>
  <title>AI Career System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CINEMATIC WELCOME SCREEN -->
<div id="welcomeScreen">
  <img src="https://cdn.dribbble.com/users/1162077/screenshots/3848914/programmer.gif">
  <h2>Welcome to AI Career System 🚀</h2>
</div>

<!-- MAIN APP -->
<div class="container">

  <h1 class="glow">🚀 AI Career Final Boss</h1>

  <input id="name" placeholder="Enter your name">

  <select id="interest">
    <option value="coding">Coding</option>
    <option value="design">Design</option>
    <option value="data">Data</option>
  </select>

  <button onclick="getCareer()">Get Career</button>

  <div id="loader" class="hidden">🧠 AI Thinking...</div>

  <h2 id="output"></h2>

  <hr>

  <input id="chat" placeholder="Ask AI...">
  <button onclick="askAI()">Ask</button>

</div>

<script src="script.js"></script>

</body>
</html>
