<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Career Guidance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginPage">
    <div class="login-box">
        <h2>Welcome</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- CARTOON ENTRY -->
<div id="cartoon">
    <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/animal-2023924_1280.png">
    <h3>Welcome to AI Career Guide</h3>
</div>

<!-- CHAT UI -->
<div id="app">
    <div id="chatBox"></div>
    <input id="msg" placeholder="Ask your career doubt">
    <button onclick="send()">Send</button>
</div>

<script src="script.js"></script>
</body>
</html>
